name: Build Windows Release

on:
  workflow_dispatch:
  push:
    branches:
      - dev
      - main
    tags:
      - "v*"
  pull_request:
    branches:
      - dev
      - main

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch FFmpeg (thirdparty)
        run: |
          python scripts/fetch_ffmpeg_windows.py

      - name: Build exe (cx_Freeze)
        run: |
          python setup.py build

      - name: Package
        shell: pwsh
        run: |
          $exeDir = Get-ChildItem -Path build -Directory | Where-Object { $_.Name -like "exe.*" } | Select-Object -First 1
          if (-not $exeDir) { throw "Could not find build\\exe.* directory" }
          $out = "YTDLP-GUI-windows.zip"
          if (Test-Path $out) { Remove-Item $out -Force }
          Compress-Archive -Path (Join-Path $exeDir.FullName "*") -DestinationPath $out
          Write-Host "Built $out from $($exeDir.FullName)"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YTDLP-GUI-windows
          path: YTDLP-GUI-windows.zip

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch FFmpeg (thirdparty)
        run: |
          python scripts/fetch_ffmpeg.py --platform linux

      - name: Build (cx_Freeze)
        run: |
          python setup.py build

      - name: Package
        shell: bash
        run: |
          set -euo pipefail
          command -v zip >/dev/null || (sudo apt-get update && sudo apt-get install -y zip)
          exe_dir="$(find build -maxdepth 1 -type d -name 'exe.*' | head -n 1 || true)"
          if [[ -z "${exe_dir}" ]]; then
            echo "Could not find build/exe.* directory"
            ls -la build || true
            exit 1
          fi
          out="YTDLP-GUI-linux.zip"
          rm -f "${out}"
          (cd "${exe_dir}" && zip -r "../../${out}" .)
          echo "Built ${out} from ${exe_dir}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: YTDLP-GUI-linux
          path: YTDLP-GUI-linux.zip

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs:
      - build-windows
      - build-linux
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: YTDLP-GUI-*
          merge-multiple: true

      - name: List release files
        shell: bash
        run: |
          set -euo pipefail
          ls -la

      - name: Release (tag)
        uses: softprops/action-gh-release@v2
        with:
          fail_on_unmatched_files: true
          files: |
            YTDLP-GUI-windows.zip
            YTDLP-GUI-linux.zip
